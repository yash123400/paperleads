<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaperLeads — Lead Manager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5F0E8;
    --paper: #EDE6D6;
    --ink: #1A1714;
    --ink-muted: #6B6359;
    --ink-faint: #B0A898;
    --accent: #C4571A;
    --accent-light: #F0E0D4;
    --green: #2D6A4F;
    --green-light: #D4EAE0;
    --amber: #B07D1A;
    --amber-light: #F5EAD0;
    --blue: #1A4A7A;
    --blue-light: #D0DFF0;
    --red: #8B1A1A;
    --red-light: #F0D0D0;
    --border: rgba(26,23,20,0.12);
    --shadow: 0 2px 12px rgba(26,23,20,0.08);
    --radius: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    font-size: 13px;
  }

  /* —— HEADER —— */
  header {
    background: var(--ink);
    color: var(--cream);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--accent);
  }
  .logo {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }
  .header-meta { font-size: 11px; color: var(--ink-faint); letter-spacing: 0.05em; }

  /* —— TOOLBAR —— */
  .toolbar {
    background: var(--paper);
    border-bottom: 1px solid var(--border);
    padding: 12px 28px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 8px 18px;
    border-radius: var(--radius);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: opacity 0.15s;
  }
  .btn-primary:hover { opacity: 0.88; }
  .search-box {
    flex: 1;
    min-width: 200px;
    max-width: 320px;
    padding: 7px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--cream);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--ink);
    outline: none;
  }
  .search-box:focus { border-color: var(--accent); }
  .filter-select {
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--cream);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--ink);
    cursor: pointer;
    outline: none;
  }
  .filter-select:focus { border-color: var(--accent); }
  .stats-bar {
    margin-left: auto;
    display: flex;
    gap: 16px;
    font-size: 11px;
    color: var(--ink-muted);
  }
  .stat-pill {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .stat-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }

  /* —— MAIN LAYOUT —— */
  main { padding: 24px 28px; }

  /* —— TABLE —— */
  .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); background: #fff; box-shadow: var(--shadow); }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--ink); color: var(--cream); }
  thead th {
    padding: 11px 14px;
    text-align: left;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    cursor: pointer;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--accent-light); }
  tbody td { padding: 11px 14px; vertical-align: middle; }
  .source-tag {
    display: inline-block;
    font-size: 10px;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 2px 6px;
    letter-spacing: 0.04em;
  }
  .status-pill {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    border-radius: 20px;
    padding: 3px 9px;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .s-new       { background: var(--blue-light);   color: var(--blue); }
  .s-contacted { background: var(--amber-light);  color: var(--amber); }
  .s-quoted    { background: #E8E0F0;              color: #5A2D82; }
  .s-won       { background: var(--green-light);  color: var(--green); }
  .s-lost      { background: var(--red-light);    color: var(--red); }

  .action-btns { display: flex; gap: 6px; }
  .icon-btn {
    background: none; border: 1px solid var(--border);
    border-radius: 4px; width: 28px; height: 28px;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; font-size: 13px;
    transition: background 0.1s, border-color 0.1s;
  }
  .icon-btn:hover { background: var(--paper); border-color: var(--ink-muted); }
  .icon-btn.del:hover { background: var(--red-light); border-color: var(--red); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-muted);
  }
  .empty-state .big { font-family: 'Fraunces', serif; font-size: 36px; margin-bottom: 8px; color: var(--ink-faint); }

  /* —— MODAL —— */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(26,23,20,0.55);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--cream);
    border-radius: 10px;
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(26,23,20,0.25);
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header {
    background: var(--ink);
    color: var(--cream);
    padding: 16px 22px;
    border-radius: 10px 10px 0 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-header h2 { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; }
  .modal-close {
    background: none; border: none; color: var(--ink-faint);
    font-size: 20px; cursor: pointer; line-height: 1;
    padding: 2px 6px; border-radius: 4px;
    transition: color 0.1s;
  }
  .modal-close:hover { color: var(--cream); }
  .modal-body { padding: 22px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-muted); }
  input, select, textarea {
    padding: 9px 11px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: #fff;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 72px; }
  .modal-footer {
    padding: 14px 22px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    background: var(--paper);
    border-radius: 0 0 10px 10px;
  }
  .btn-ghost {
    background: none; border: 1px solid var(--border);
    padding: 8px 16px; border-radius: var(--radius);
    font-family: 'DM Mono', monospace; font-size: 12px;
    cursor: pointer; color: var(--ink-muted);
    transition: background 0.1s;
  }
  .btn-ghost:hover { background: var(--cream); }

  /* —— SECTION DIVIDERS —— */
  .section-divider {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faint);
    grid-column: 1 / -1;
    margin-top: 6px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }

  /* —— DETAIL PANEL —— */
  .detail-row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 16px; }
  .detail-item { flex: 1; min-width: 120px; }
  .detail-label { font-size: 10px; color: var(--ink-muted); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 3px; }
  .detail-val { font-size: 13px; color: var(--ink); }

  /* —— TOAST —— */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--ink); color: var(--cream);
    padding: 10px 18px; border-radius: var(--radius);
    font-size: 12px; z-index: 999;
    transform: translateY(60px); opacity: 0;
    transition: all 0.25s; pointer-events: none;
    border-left: 3px solid var(--accent);
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* —— EXPORT / IMPORT —— */
  .toolbar-right { display: flex; gap: 8px; margin-left: auto; align-items: center; }
  .btn-sm {
    background: var(--paper); border: 1px solid var(--border);
    padding: 6px 12px; border-radius: var(--radius);
    font-family: 'DM Mono', monospace; font-size: 11px;
    cursor: pointer; color: var(--ink-muted);
    transition: background 0.1s;
  }
  .btn-sm:hover { background: var(--cream); color: var(--ink); }

  /* —— RESPONSIVE —— */
  @media(max-width: 700px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-group.full { grid-column: 1; }
    header { padding: 14px 16px; }
    .toolbar, main { padding: 10px 14px; }
    .stats-bar { display: none; }
    thead th:nth-child(n+5) { display: none; }
    tbody td:nth-child(n+5) { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Paper<span>Leads</span></div>
  <div class="header-meta" id="headerDate"></div>
</header>

<div class="toolbar">
  <button class="btn-primary" onclick="openModal()">+ New Lead</button>
  <input class="search-box" id="searchBox" placeholder="Search name, company, paper type…" oninput="render()">
  <select class="filter-select" id="statusFilter" onchange="render()">
    <option value="">All Status</option>
    <option value="New">New</option>
    <option value="Contacted">Contacted</option>
    <option value="Quoted">Quoted</option>
    <option value="Won">Won</option>
    <option value="Lost">Lost</option>
  </select>
  <select class="filter-select" id="sourceFilter" onchange="render()">
    <option value="">All Sources</option>
    <option value="IndiaMart">IndiaMart</option>
    <option value="Paper Index">Paper Index</option>
    <option value="Referral">Referral</option>
    <option value="Direct">Direct</option>
    <option value="Other">Other</option>
  </select>
  <div class="stats-bar" id="statsBar"></div>
  <div class="toolbar-right">
    <button class="btn-sm" onclick="exportCSV()">↓ CSV</button>
    <button class="btn-sm" onclick="document.getElementById('importFile').click()">↑ Import</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
    <button class="btn-sm" onclick="exportJSON()">💾 Backup</button>
  </div>
</div>

<main>
  <div class="table-wrap">
    <table id="leadsTable">
      <thead>
        <tr>
          <th>#</th>
          <th>Contact / Company</th>
          <th>Paper Type</th>
          <th>GSM</th>
          <th>Qty (MT/Ream)</th>
          <th>Destination</th>
          <th>Source</th>
          <th>Status</th>
          <th>Date</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="leadsBody"></tbody>
    </table>
  </div>
</main>

<!-- ADD / EDIT MODAL -->
<div class="overlay" id="overlay" onclick="closeOnBg(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 id="modalTitle">New Lead</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="section-divider">Contact Information</div>

        <div class="form-group">
          <label>Contact Person *</label>
          <input id="f-contact" placeholder="Name" required>
        </div>
        <div class="form-group">
          <label>Company / Firm</label>
          <input id="f-company" placeholder="Company name">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input id="f-phone" placeholder="+91 XXXXX XXXXX" type="tel">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input id="f-email" placeholder="email@example.com" type="email">
        </div>

        <div class="section-divider">Paper Requirements</div>

        <div class="form-group">
          <label>Paper Type *</label>
          <input id="f-papertype" placeholder="e.g. Kraft, MG, Poster, Stiffener…" list="papertype-suggestions">
          <datalist id="papertype-suggestions">
            <option>Poster Paper</option>
            <option>Kraft Paper</option>
            <option>MG Paper</option>
            <option>Stiffener Paper</option>
            <option>Writing Paper</option>
            <option>Newsprint</option>
            <option>Art Paper</option>
            <option>Duplex Board</option>
            <option>Packaging Paper</option>
            <option>Offset Paper</option>
          </datalist>
        </div>
        <div class="form-group">
          <label>GSM Requirement</label>
          <input id="f-gsm" placeholder="e.g. 70, 80, 100–120">
        </div>
        <div class="form-group">
          <label>Order Quantity</label>
          <input id="f-qty" placeholder="e.g. 5 MT, 200 Reams">
        </div>
        <div class="form-group">
          <label>Destination / City</label>
          <input id="f-destination" placeholder="e.g. Mumbai, Chennai">
        </div>

        <div class="section-divider">Lead Details</div>

        <div class="form-group">
          <label>Lead Source</label>
          <select id="f-source">
            <option value="IndiaMart">IndiaMart</option>
            <option value="Paper Index">Paper Index</option>
            <option value="Referral">Referral</option>
            <option value="Direct">Direct</option>
            <option value="WhatsApp">WhatsApp</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="f-status">
            <option value="New">New</option>
            <option value="Contacted">Contacted</option>
            <option value="Quoted">Quoted</option>
            <option value="Won">Won</option>
            <option value="Lost">Lost</option>
          </select>
        </div>
        <div class="form-group full">
          <label>Notes / Follow-up</label>
          <textarea id="f-notes" placeholder="Pricing discussed, special requirements, follow-up date…"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveLead()">Save Lead</button>
    </div>
  </div>
</div>

<!-- VIEW MODAL -->
<div class="overlay" id="viewOverlay" onclick="closeViewOnBg(event)">
  <div class="modal" id="viewModal">
    <div class="modal-header">
      <h2 id="viewTitle">Lead Details</h2>
      <button class="modal-close" onclick="closeView()">✕</button>
    </div>
    <div class="modal-body" id="viewBody"></div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeView()">Close</button>
      <button class="btn-primary" id="viewEditBtn">Edit Lead</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORE = 'paperleads_v1';
let leads = JSON.parse(localStorage.getItem(STORE) || '[]');
let editId = null;

// —— UTILS ——
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function save() { localStorage.setItem(STORE, JSON.stringify(leads)); }
function fmt(d) { return new Date(d).toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'2-digit'}); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

const statusClass = { New:'s-new', Contacted:'s-contacted', Quoted:'s-quoted', Won:'s-won', Lost:'s-lost' };

// —— RENDER ——
function render() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  const sf = document.getElementById('statusFilter').value;
  const src = document.getElementById('sourceFilter').value;

  let filtered = leads.filter(l => {
    const matchQ = !q || [l.contact, l.company, l.papertype, l.destination, l.phone].some(v => (v||'').toLowerCase().includes(q));
    const matchS = !sf || l.status === sf;
    const matchSrc = !src || l.source === src;
    return matchQ && matchS && matchSrc;
  });

  // stats
  const counts = { New:0, Contacted:0, Quoted:0, Won:0, Lost:0 };
  leads.forEach(l => { if(counts[l.status] !== undefined) counts[l.status]++; });
  const colors = { New:'#1A4A7A', Contacted:'#B07D1A', Quoted:'#5A2D82', Won:'#2D6A4F', Lost:'#8B1A1A' };
  document.getElementById('statsBar').innerHTML = Object.entries(counts).map(([s,c]) =>
    `<span class="stat-pill"><span class="stat-dot" style="background:${colors[s]}"></span>${s}: ${c}</span>`
  ).join('');

  const body = document.getElementById('leadsBody');
  if (!filtered.length) {
    body.innerHTML = `<tr><td colspan="10"><div class="empty-state"><div class="big">∅</div><div>No leads yet. Add your first lead above.</div></div></td></tr>`;
    return;
  }

  body.innerHTML = filtered.map((l, i) => `
    <tr onclick="viewLead('${l.id}')">
      <td style="color:var(--ink-faint);font-size:11px">${i+1}</td>
      <td>
        <div style="font-weight:500">${esc(l.contact)}</div>
        ${l.company ? `<div style="font-size:11px;color:var(--ink-muted)">${esc(l.company)}</div>` : ''}
      </td>
      <td>${esc(l.papertype)}</td>
      <td>${esc(l.gsm) || '—'}</td>
      <td>${esc(l.qty) || '—'}</td>
      <td>${esc(l.destination) || '—'}</td>
      <td><span class="source-tag">${esc(l.source)}</span></td>
      <td><span class="status-pill ${statusClass[l.status]||'s-new'}">${l.status}</span></td>
      <td style="color:var(--ink-muted);font-size:11px;white-space:nowrap">${fmt(l.date)}</td>
      <td onclick="event.stopPropagation()">
        <div class="action-btns">
          <button class="icon-btn" title="Quick status cycle" onclick="cycleStatus('${l.id}')">⟳</button>
          <button class="icon-btn" title="Edit" onclick="openModal('${l.id}')">✎</button>
          <button class="icon-btn del" title="Delete" onclick="deleteLead('${l.id}')">✕</button>
        </div>
      </td>
    </tr>
  `).join('');
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// —— MODAL ——
function openModal(id) {
  editId = id || null;
  document.getElementById('modalTitle').textContent = id ? 'Edit Lead' : 'New Lead';
  const fields = ['contact','company','phone','email','papertype','gsm','qty','destination','source','status','notes'];
  if (id) {
    const l = leads.find(x => x.id === id);
    if (!l) return;
    fields.forEach(f => {
      const el = document.getElementById('f-'+f);
      if (el) el.value = l[f] || '';
    });
  } else {
    fields.forEach(f => {
      const el = document.getElementById('f-'+f);
      if (el) el.value = (f === 'status') ? 'New' : (f === 'source') ? 'IndiaMart' : '';
    });
  }
  document.getElementById('overlay').classList.add('open');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); editId = null; }
function closeOnBg(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

function saveLead() {
  const contact = document.getElementById('f-contact').value.trim();
  const papertype = document.getElementById('f-papertype').value;
  if (!contact) { showToast('Contact person is required'); return; }
  if (!papertype) { showToast('Please select a paper type'); return; }

  const data = {
    contact,
    company:     document.getElementById('f-company').value.trim(),
    phone:       document.getElementById('f-phone').value.trim(),
    email:       document.getElementById('f-email').value.trim(),
    papertype,
    gsm:         document.getElementById('f-gsm').value.trim(),
    qty:         document.getElementById('f-qty').value.trim(),
    destination: document.getElementById('f-destination').value.trim(),
    source:      document.getElementById('f-source').value,
    status:      document.getElementById('f-status').value,
    notes:       document.getElementById('f-notes').value.trim(),
  };

  if (editId) {
    const idx = leads.findIndex(x => x.id === editId);
    if (idx > -1) leads[idx] = { ...leads[idx], ...data };
    showToast('Lead updated');
  } else {
    leads.unshift({ id: uid(), date: Date.now(), ...data });
    showToast('Lead added');
  }
  save(); render(); closeModal();
}

// —— VIEW ——
function viewLead(id) {
  const l = leads.find(x => x.id === id);
  if (!l) return;
  document.getElementById('viewTitle').textContent = l.contact + (l.company ? ' — ' + l.company : '');
  document.getElementById('viewEditBtn').onclick = () => { closeView(); openModal(id); };

  const html = `
    <div class="detail-row">
      <div class="detail-item"><div class="detail-label">Status</div><div><span class="status-pill ${statusClass[l.status]||'s-new'}">${l.status}</span></div></div>
      <div class="detail-item"><div class="detail-label">Source</div><div><span class="source-tag">${esc(l.source)}</span></div></div>
      <div class="detail-item"><div class="detail-label">Date</div><div class="detail-val">${fmt(l.date)}</div></div>
    </div>
    <div style="border-top:1px solid var(--border);padding-top:14px;margin-bottom:14px">
      <div style="font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:10px">Contact Details</div>
      <div class="detail-row">
        <div class="detail-item"><div class="detail-label">Person</div><div class="detail-val" style="font-weight:500">${esc(l.contact)}</div></div>
        <div class="detail-item"><div class="detail-label">Company</div><div class="detail-val">${esc(l.company)||'—'}</div></div>
      </div>
      <div class="detail-row">
        <div class="detail-item"><div class="detail-label">Phone</div><div class="detail-val">${l.phone ? `<a href="tel:${esc(l.phone)}" style="color:var(--accent)">${esc(l.phone)}</a>` : '—'}</div></div>
        <div class="detail-item"><div class="detail-label">Email</div><div class="detail-val">${l.email ? `<a href="mailto:${esc(l.email)}" style="color:var(--accent)">${esc(l.email)}</a>` : '—'}</div></div>
      </div>
    </div>
    <div style="border-top:1px solid var(--border);padding-top:14px;margin-bottom:14px">
      <div style="font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:10px">Paper Requirements</div>
      <div class="detail-row">
        <div class="detail-item"><div class="detail-label">Paper Type</div><div class="detail-val" style="font-weight:500">${esc(l.papertype)||'—'}</div></div>
        <div class="detail-item"><div class="detail-label">GSM</div><div class="detail-val">${esc(l.gsm)||'—'}</div></div>
      </div>
      <div class="detail-row">
        <div class="detail-item"><div class="detail-label">Quantity</div><div class="detail-val">${esc(l.qty)||'—'}</div></div>
        <div class="detail-item"><div class="detail-label">Destination</div><div class="detail-val">${esc(l.destination)||'—'}</div></div>
      </div>
    </div>
    ${l.notes ? `
    <div style="border-top:1px solid var(--border);padding-top:14px">
      <div style="font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:8px">Notes</div>
      <div style="font-size:13px;color:var(--ink);line-height:1.7;background:var(--paper);padding:12px;border-radius:var(--radius);white-space:pre-wrap">${esc(l.notes)}</div>
    </div>` : ''}
  `;
  document.getElementById('viewBody').innerHTML = html;
  document.getElementById('viewOverlay').classList.add('open');
}
function closeView() { document.getElementById('viewOverlay').classList.remove('open'); }
function closeViewOnBg(e) { if (e.target === document.getElementById('viewOverlay')) closeView(); }

// —— ACTIONS ——
const statusCycle = ['New','Contacted','Quoted','Won','Lost'];
function cycleStatus(id) {
  const l = leads.find(x => x.id === id);
  if (!l) return;
  const idx = statusCycle.indexOf(l.status);
  l.status = statusCycle[(idx + 1) % statusCycle.length];
  save(); render();
  showToast('Status → ' + l.status);
}

function deleteLead(id) {
  if (!confirm('Delete this lead?')) return;
  leads = leads.filter(x => x.id !== id);
  save(); render();
  showToast('Lead deleted');
}

// —— EXPORT / IMPORT ——
function exportCSV() {
  const headers = ['Contact','Company','Phone','Email','Paper Type','GSM','Quantity','Destination','Source','Status','Notes','Date'];
  const rows = leads.map(l => [
    l.contact, l.company, l.phone, l.email, l.papertype,
    l.gsm, l.qty, l.destination, l.source, l.status, l.notes, fmt(l.date)
  ].map(v => `"${(v||'').replace(/"/g,'""')}"`).join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  download('paperleads.csv', 'text/csv', csv);
}
function exportJSON() {
  download('paperleads-backup.json', 'application/json', JSON.stringify(leads, null, 2));
  showToast('Backup saved');
}
function importJSON(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data)) throw new Error();
      leads = data; save(); render();
      showToast('Imported ' + data.length + ' leads');
    } catch { showToast('Invalid backup file'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}
function download(name, type, content) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], {type}));
  a.download = name; a.click();
}

// —— KEYBOARD ——
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeView(); }
  if (e.key === 'n' && !document.getElementById('overlay').classList.contains('open') && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') openModal();
});

// —— INIT ——
document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en-IN', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
render();
</script>
</body>
</html>
